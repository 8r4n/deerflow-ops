# DeerFlow Mission Kickoff — scaffold for automated mission processing
#
# Triggers:
#   - workflow_dispatch: manual kickoff with a required mission issue number
#   - issues: auto-kickoff when an issue is labeled with status:active
#
# Current behavior (scaffold):
#   Validates the mission issue, sets up the DeerFlow environment, and posts
#   kickoff/completion comments. The actual DeerFlow autonomous processing step
#   is a placeholder that logs readiness — full execution requires LLM API keys
#   configured as repository secrets.
#
# Planned enhancement:
#   Wire the "Validate environment" step to the real DeerFlow entrypoint once
#   LLM API keys and MCP servers are provisioned.

name: Mission Kickoff

on:
  workflow_dispatch:
    inputs:
      mission_issue:
        description: "Mission issue number to process"
        required: true
        type: string
      model:
        description: "LLM model to use (default: from config)"
        required: false
        type: string
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  packages: read

jobs:
  kickoff:
    # Run on workflow_dispatch always, or on issue labeled with status:active
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'status:active')
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEER_FLOW_EXTENSIONS_CONFIG_PATH: ${{ github.workspace }}/extensions_config.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine mission issue number
        id: mission
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE="${{ inputs.mission_issue }}"
          else
            ISSUE="${{ github.event.issue.number }}"
          fi
          if [ -z "$ISSUE" ]; then
            echo "::error::No mission issue number provided"
            exit 1
          fi
          echo "issue_number=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "Mission issue: #$ISSUE"

      - name: Validate mission issue has mission label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh issue view "${{ steps.mission.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --json labels --jq '.labels[].name')
          echo "Labels: $LABELS"
          if ! echo "$LABELS" | grep -q "^mission:"; then
            echo "::error::Issue #${{ steps.mission.outputs.issue_number }} does not have a mission:* label"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install DeerFlow backend dependencies
        working-directory: deer-flow
        run: |
          pip install -e ".[dev]"

      - name: Configure DeerFlow
        working-directory: deer-flow
        run: |
          test -f config.yaml || cp config.example.yaml config.yaml
          test -f .env || cp .env.example .env

      - name: Post kickoff comment to mission issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.mission.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "🦌 **DeerFlow Kickoff** — Run triggered by \`${{ github.event_name }}\` ([workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))"

      - name: Validate environment (scaffold — does not yet run DeerFlow autonomously)
        working-directory: deer-flow
        env:
          MISSION_ISSUE: ${{ steps.mission.outputs.issue_number }}
          MISSION_REPO: ${{ github.repository }}
          MODEL_OVERRIDE: ${{ inputs.model }}
        run: |
          python - <<'PY'
          import os

          issue = os.environ["MISSION_ISSUE"]
          repo = os.environ["MISSION_REPO"]
          model = os.environ.get("MODEL_OVERRIDE", "")

          print(f"Processing mission issue #{issue} from {repo}")
          print(f"Model override: {model or '(default)'}")
          print(f"Extensions config: {os.environ.get('DEER_FLOW_EXTENSIONS_CONFIG_PATH', '(not set)')}")
          print()
          print("Environment validated — DeerFlow dependencies and config are present.")
          print("Note: Full autonomous execution requires LLM API keys added as repository secrets.")
          print("This step will be wired to the DeerFlow entrypoint once secrets are provisioned.")
          PY

      - name: Post completion comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          gh issue comment "${{ steps.mission.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "$EMOJI **DeerFlow Run Complete** — Status: \`$STATUS\` ([workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))"
